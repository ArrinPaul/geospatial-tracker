# Render deployment config for the backend
# https://render.com/docs/deploy-with-blueprint

services:
  - type: web
    name: geospatial-tracker-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: TOGETHER_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DETECTION_CYCLE_INTERVAL
        value: "15"
    rootDir: backend
    plan: free
